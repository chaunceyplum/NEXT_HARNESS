AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Tool-executor state machine for the harness agent loop. One Step Functions
  execution == one MCP tool call made by the Next.js agent (lib/llm/agent.ts
  picks the tool; this state machine runs it durably, with native retries,
  execution history, and cancel support instead of a bare HTTP call).

Parameters:
  McpEndpointUrl:
    Type: String
    Description: Same MCP_ENDPOINT_URL the Next.js harness already uses (API Gateway URL for the MCP Lambda).
  McpApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: Optional — only if the MCP API Gateway stage requires x-api-key.
  McpAuthToken:
    Type: String
    NoEcho: true
    Default: ''
    Description: Optional — only if the MCP endpoint is fronted by a bearer-token authorizer.

Conditions:
  HasApiKey: !Not [!Equals [!Ref McpApiKey, '']]
  HasAuthToken: !Not [!Equals [!Ref McpAuthToken, '']]

Resources:
  McpToolExecutorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/mcp-tool-executor/
      Handler: index.handler
      Runtime: nodejs20.x
      Timeout: 100
      MemorySize: 256
      Environment:
        Variables:
          MCP_ENDPOINT_URL: !Ref McpEndpointUrl
          MCP_API_KEY: !If [HasApiKey, !Ref McpApiKey, !Ref 'AWS::NoValue']
          MCP_AUTH_TOKEN: !If [HasAuthToken, !Ref McpAuthToken, !Ref 'AWS::NoValue']
          MCP_REQUEST_TIMEOUT_MS: '90000'

  ToolExecutorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/vendedlogs/states/${AWS::StackName}-tool-executor'
      RetentionInDays: 30

  ToolExecutorStateMachineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeToolExecutorLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt McpToolExecutorFunction.Arn
        - PolicyName: StepFunctionsCloudWatchLogging
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Wildcard resource is required for these actions — Step Functions
              # execution logging is not scoped to a single log group ARN.
              # https://docs.aws.amazon.com/step-functions/latest/dg/cw-logs.html
              - Effect: Allow
                Action:
                  - logs:CreateLogDelivery
                  - logs:GetLogDelivery
                  - logs:UpdateLogDelivery
                  - logs:DeleteLogDelivery
                  - logs:ListLogDeliveries
                  - logs:PutResourcePolicy
                  - logs:DescribeResourcePolicies
                  - logs:DescribeLogGroups
                Resource: '*'

  ToolExecutorStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub '${AWS::StackName}-tool-executor'
      Type: STANDARD
      DefinitionUri: statemachine/tool-executor.asl.json
      DefinitionSubstitutions:
        McpToolExecutorFunctionArn: !GetAtt McpToolExecutorFunction.Arn
      Role: !GetAtt ToolExecutorStateMachineRole.Arn
      Logging:
        Level: ALL
        IncludeExecutionData: true
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt ToolExecutorLogGroup.Arn

Outputs:
  StateMachineArn:
    Description: Set this as TOOL_EXECUTOR_STATE_MACHINE_ARN in the Next.js harness's .env.local
    Value: !Ref ToolExecutorStateMachine
  McpToolExecutorFunctionArn:
    Value: !GetAtt McpToolExecutorFunction.Arn
  LogGroupName:
    Value: !Ref ToolExecutorLogGroup
